# ScholarCLI default configuration.
# Override by copying to config/local.toml (loaded last if present).

[ollama]
base_url = "http://localhost:11434"

[models]
embedding = "qwen3-embedding:0.6b"
# Vision model for image/diagram descriptions + low-confidence OCR recovery.
# Lightweight by default; override per-user from the Settings page.
vision = "qwen2.5vl:3b"

# Per-task generation model routing. The router picks a task label; the LLM
# factory maps the label -> model tag here. Add a row to wire a new study mode.
# NOTE: confirm exact tags against `ollama list` and edit if they differ.
[models.routing]
quick_qa      = "qwen3:8b"
flashcards    = "gemma4:12b"
quiz          = "gemma4:12b"
mermaid       = "gemma4:12b"
mindmap       = "gemma4:12b"
study_notes   = "gemma4:12b"
deep_analysis = "gemma4:12b"
differences   = "gemma4:12b"

[chunking]
# token-ish budget (approx 4 chars/token); structural boundaries preferred
chunk_size = 800
chunk_overlap = 120

[ingest]
# Multimodal ingestion via Ollama only (no torch/heavy OCR engine).
# Set vision_enabled = false to skip image descriptions + scanned-page OCR.
ocr_enabled = true
vision_enabled = true
tables_enabled = true
scanned_min_chars = 40
max_concurrent = 3

[multi_hop]
enabled = true
max_hops = 2

[duplicate_detection]
enabled = true
overlap_threshold = 0.30
scope = "course"

[retrieval]
top_k = 5
# cosine distance from LanceDB; below this the chunk counts as relevant.
# LanceDB returns _distance (lower = closer). Gate keeps best <= max_distance.
max_distance = 0.55

[paths]
data_dir = "data"
