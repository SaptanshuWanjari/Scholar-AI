<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="360" viewBox="0 0 1200 360"
     role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">ScholarAI — Local-first AI study assistant</title>
  <desc id="hero-desc">ScholarAI ingests PDFs, Markdown, and other study materials into a local vector database and uses local LLMs via Ollama to generate flashcards, quizzes, revision notes, mindmaps, and practice exams — running entirely on your machine.</desc>

  <defs>
    <linearGradient id="edge-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#21262D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#21262D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="24" fill="#0A0E14"/>

  <!-- Right: knowledge graph motif -->
  <g transform="translate(690 30)">
    <!-- Source document -->
    <rect x="340" y="20" width="44" height="58" rx="5" fill="#0A0E14" stroke="#21262D" stroke-width="1.5"/>
    <rect x="346" y="28" width="14" height="2" rx="1" fill="#30363D"/>
    <rect x="346" y="34" width="26" height="2" rx="1" fill="#30363D"/>
    <rect x="346" y="40" width="20" height="2" rx="1" fill="#30363D"/>
    <rect x="346" y="46" width="24" height="2" rx="1" fill="#30363D"/>
    <rect x="346" y="52" width="16" height="2" rx="1" fill="#30363D"/>
    <rect x="346" y="58" width="22" height="2" rx="1" fill="#30363D"/>

    <!-- Arrow: document → graph -->
    <line x1="390" y1="49" x2="420" y2="49" stroke="#21262D" stroke-width="1.2"/>
    <polygon points="418,45 426,49 418,53" fill="#30363D"/>

    <!-- Central topic node -->
    <circle cx="120" cy="100" r="15" fill="none" stroke="#58A6FF" stroke-width="2" opacity="0.85"/>
    <circle cx="120" cy="100" r="5" fill="#58A6FF" opacity="0.55"/>

    <!-- Satellite nodes -->
    <circle cx="55" cy="45" r="7" fill="none" stroke="#58A6FF" stroke-width="1.3" opacity="0.5"/>
    <circle cx="200" cy="35" r="6" fill="none" stroke="#58A6FF" stroke-width="1.3" opacity="0.45"/>
    <circle cx="250" cy="110" r="5" fill="none" stroke="#D29922" stroke-width="1.3" opacity="0.65"/>
    <circle cx="195" cy="175" r="7" fill="none" stroke="#58A6FF" stroke-width="1.3" opacity="0.4"/>
    <circle cx="90" cy="185" r="9" fill="none" stroke="#D29922" stroke-width="1.3" opacity="0.55"/>
    <circle cx="40" cy="130" r="5" fill="none" stroke="#58A6FF" stroke-width="1.3" opacity="0.45"/>
    <circle cx="155" cy="255" r="6" fill="none" stroke="#58A6FF" stroke-width="1.3" opacity="0.35"/>
    <circle cx="285" cy="195" r="5" fill="none" stroke="#58A6FF" stroke-width="1.3" opacity="0.35"/>
    <circle cx="55" cy="270" r="8" fill="none" stroke="#D29922" stroke-width="1.3" opacity="0.45"/>

    <!-- Edges from central node -->
    <line x1="120" y1="85" x2="55" y2="51" stroke="#21262D" stroke-width="1"/>
    <line x1="120" y1="85" x2="200" y2="41" stroke="#21262D" stroke-width="1"/>
    <line x1="120" y1="115" x2="250" y2="110" stroke="#21262D" stroke-width="1"/>
    <line x1="120" y1="115" x2="195" y2="175" stroke="#21262D" stroke-width="1"/>
    <line x1="120" y1="115" x2="90" y2="185" stroke="#21262D" stroke-width="1"/>
    <line x1="120" y1="85" x2="40" y2="130" stroke="#21262D" stroke-width="0.8"/>

    <!-- Secondary edges -->
    <line x1="90" y1="185" x2="155" y2="255" stroke="#21262D" stroke-width="0.8"/>
    <line x1="250" y1="110" x2="285" y2="195" stroke="#21262D" stroke-width="0.7"/>
    <line x1="90" y1="185" x2="55" y2="270" stroke="#21262D" stroke-width="0.8"/>
    <line x1="195" y1="175" x2="155" y2="255" stroke="#21262D" stroke-width="0.7"/>
    <line x1="55" y1="45" x2="40" y2="130" stroke="#21262D" stroke-width="0.6"/>

    <!-- Accent node fills -->
    <circle cx="250" cy="110" r="2.5" fill="#D29922" opacity="0.45"/>
    <circle cx="90" cy="185" r="4" fill="#D29922" opacity="0.35"/>
    <circle cx="55" cy="270" r="3.5" fill="#D29922" opacity="0.3"/>
  </g>

  <!-- Left: title block -->
  <g transform="translate(56 52)">
    <!-- Eyebrow -->
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#58A6FF" letter-spacing="3">LOCAL-FIRST AI STUDY ASSISTANT</text>

    <!-- Project name -->
    <text x="0" y="50" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="62" font-weight="700" fill="#E6EDF3" letter-spacing="-1">ScholarAI</text>

    <!-- Value lines -->
    <text x="0" y="104" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="20" fill="#8B949E">
      Ingest study materials and generate flashcards,
    </text>
    <text x="0" y="134" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="20" fill="#8B949E">
      quizzes, revision notes, and practice exams —
    </text>
    <text x="0" y="164" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="20" fill="#8B949E">
      running entirely on your machine.
    </text>

    <!-- Tech pills -->
    <g transform="translate(0 216)">
      <rect x="0" y="0" width="78" height="28" rx="6" fill="#0A0E14" stroke="#21262D" stroke-width="1"/>
      <text x="39" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8B949E" text-anchor="middle">Python 3.12</text>

      <rect x="90" y="0" width="76" height="28" rx="6" fill="#0A0E14" stroke="#21262D" stroke-width="1"/>
      <text x="128" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8B949E" text-anchor="middle">Ollama LLM</text>

      <rect x="178" y="0" width="68" height="28" rx="6" fill="#0A0E14" stroke="#D29922" stroke-width="1" stroke-opacity="0.35"/>
      <text x="212" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#D29922" text-anchor="middle">LanceDB</text>

      <rect x="258" y="0" width="78" height="28" rx="6" fill="#0A0E14" stroke="#21262D" stroke-width="1"/>
      <text x="297" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8B949E" text-anchor="middle">LangGraph</text>
    </g>
  </g>
</svg>
